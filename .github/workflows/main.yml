name: Loki Task

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - name: Generate a token
      id: generate-token
      uses: actions/create-github-app-token@v2
      with:
        app-id: ${{ secrets.APP_ID }}
        private-key: ${{ secrets.APP_PRIVATE_KEY }}
    - uses: actions/checkout@v6
    - name: Build and start containers for a services
      run: docker compose version; docker compose up -d --force-recreate
    - name: Test containers functionality
      uses: cypress-io/github-action@v6
      env:
        CYPRESS_BASE_URL: http://localhost:8080
        CYPRESS_GRAFANA_URL: http://localhost:9090
        LANGUAGE: en-US
      with:
        working-directory: ./.github/tests
    - uses: actions/upload-artifact@v7
      if: failure()
      with:
        name: cypress-screenshots
        path: ./.github/tests/cypress/screenshots
        if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`
    - name: Final Step
      env:
        GH_TOKEN: ${{ steps.generate-token.outputs.token }}
      run: |
        gh repo edit $GITHUB_REPOSITORY --visibility private --accept-visibility-change-consequences
