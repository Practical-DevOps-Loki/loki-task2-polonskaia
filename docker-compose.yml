services:
  webapp:
    build: .
    labels:
      logging: "promtail"
      logging_jobname: "webapp_logs"
      webapp: "varlogs"
    ports:
      - 8080:8000
    volumes:
    - log-data:/app/log/
    environment:
      - PORT=8000
      - LOG_PATH=/app/log/app.log
    depends_on:
      grafana:
        condition: service_healthy
    

  grafana:
    image: grafana/grafana:10.4.0
    ports:
      - 9090:3000
    volumes:
      - ./loki-config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true
      - GF_SERVER_HTTP_PORT=3000
      - GF_SERVER_PROTOCOL=http
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 30s
    
    depends_on:
      loki:
        condition: service_healthy
    

  loki:
    build: loki/
    ports:
      - 3100:3100
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3100/ready"]
      interval: 10s
      timeout: 10s
      retries: 3
      start_period: 30s

  promtail:
    image: grafana/promtail
    volumes:
      - ./loki-config/promtail.yaml:/etc/promtail/webapp-config.yaml
      - log-data:/var/log/webapp:ro
    command: -config.file=/etc/promtail/webapp-config.yaml
    depends_on:
      loki:
        condition: service_healthy

volumes:
  log-data: